<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>PPT演示文稿</title>
<style>
  :root {
    --accent: #6366f1;
    --success: #22c55e;
    --surface: #0f0e17;
    --surface-light: #1a1a2e;
    --text: #f8f9fa;
    --text-muted: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--surface);
    color: var(--text);
    overflow-x: hidden;
  }

  /* Slide 1: 封面 - 全屏高度 */
  .slide {
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .slide-1 {
    height: 100vh;
    background: linear-gradient(135deg, #0f0e17 0%, #312e81 50%, #0f172a 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 60px;
  }
  .slide-1 h1 {
    font-size: 78px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
  }
  .slide-1 .subtitle {
    font-size: 32px;
    color: var(--text-muted);
    opacity: 0;
    animation: fadeInUp 1s ease 0.3s forwards;
  }
  .slide-1 .ani-badge {
    display: inline-block;
    margin-top: 40px;
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-radius: 999px;
    font-size: 18px;
    font-weight: 600;
    opacity: 0;
    animation: fadeInUp 1s ease 0.6s forwards;
  }

  /* Slide 2: 特点并列 - 紧凑高度 */
  .slide-2 {
    background: var(--surface-light);
    padding: 80px 120px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
    height: auto;
  }
  .feature-card {
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    opacity: 0;
    animation: fadeInUp 1s ease 0.2s forwards;
  }
  .feature-card .icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .feature-card h3 {
    font-size: 24px;
    margin-bottom: 12px;
  }
  .feature-card p {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* Slide 3: 数据展示 - 不同高度 */
  .slide-3 {
    background: var(--surface);
    padding: 60px 120px;
    height: auto;
  }
  .slide-3 h2 {
    font-size: 48px;
    margin-bottom: 40px;
    text-align: center;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }
  .stat-box {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
  }
  .stat-number {
    font-size: 64px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label {
    font-size: 18px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* 动画keyframes */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 装饰元素 */
  .particle-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .nav-dot { display: none; }
  .prog { display: none; }
</style>
</head>
<body>

<section class="slide slide-1">
  <div class="particle-bg"></div>
  <h1 class="ani">🚀 AI 产品升级方案</h1>
  <p class="subtitle ani">2026年度 · 技术驱动 · 用户体验飞跃</p>
  <div class="ani ani-badge">立即了解</div>
</section>

<section class="slide slide-2">
  <div class="feature-card ani">
    <div class="icon">⚡</div>
    <h3>极速响应</h3>
    <p>推理速度提升 300%，用户零等待</p>
  </div>
  <div class="feature-card ani">
    <div class="icon">🎯</div>
    <h3>精准推荐</h3>
    <p>AI个性化引擎，千人千面</p>
  </div>
  <div class="feature-card ani">
    <div class="icon">🔒</div>
    <h3>数据安全</h3>
    <p>端到端加密，隐私零泄露</p>
  </div>
  <div class="feature-card ani">
    <div class="icon">🌐</div>
    <h3>全球部署</h3>
    <p>覆盖50+国家，毫秒级延迟</p>
  </div>
</section>

<section class="slide slide-3">
  <h2 class="ani">数据表现</h2>
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-number ani">150%</div>
      <div class="stat-label">用户增长</div>
    </div>
    <div class="stat-box">
      <div class="stat-number ani">8.9</div>
      <div class="stat-label">用户满意度</div>
    </div>
    <div class="stat-box">
      <div class="stat-number ani">99.9%</div>
      <div class="stat-label">系统可用性</div>
    </div>
  </div>
</section>

<!-- 粒子canvas装饰 -->
<canvas id="particle-canvas"></canvas>

<script>
// 粒子背景脚本
(function() {
  const canvas = document.getElementById('particle-canvas');
  if (!canvas) return;
  // canvas内容不影响PDF生成。
})();
</script>

</body>
</html>
